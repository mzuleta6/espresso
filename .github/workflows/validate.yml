name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate JSON files
        run: |
          echo "→ plugin.json"
          python3 -m json.tool plugin.json > /dev/null

          echo "→ marketplace.json"
          python3 -m json.tool marketplace.json > /dev/null

          echo "→ plugins/espresso/.claude-plugin/plugin.json"
          python3 -m json.tool plugins/espresso/.claude-plugin/plugin.json > /dev/null

          echo "All JSON files are valid."

      - name: Verify skill paths resolve
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          with open('plugin.json') as f:
              d = json.load(f)
          for skill in d.get('skills', []):
              path = skill['path']
              if not os.path.isfile(path):
                  print(f"FAIL: root plugin.json → {path} does not exist")
                  sys.exit(1)
              print(f"OK: root plugin.json → {path}")

          with open('plugins/espresso/.claude-plugin/plugin.json') as f:
              d = json.load(f)
          for skill in d.get('skills', []):
              path = os.path.join('plugins/espresso', skill['path'])
              if not os.path.isfile(path):
                  print(f"FAIL: nested plugin.json → {path} does not exist")
                  sys.exit(1)
              print(f"OK: nested plugin.json → {path}")

          print("All skill paths resolve.")
          PYEOF

      - name: Check SKILL.md copies are in sync
        run: |
          diff SKILL.md plugins/espresso/skills/espresso/SKILL.md \
            && echo "SKILL.md copies are in sync." \
            || (echo "FAIL: SKILL.md copies have diverged." && exit 1)

      - name: Check plugin.json copies are in sync
        run: |
          ROOT=$(python3 -c "
          import json
          with open('plugin.json') as f:
              d = json.load(f)
          d.pop('skills', None)
          print(json.dumps(d, sort_keys=True))
          ")
          NESTED=$(python3 -c "
          import json
          with open('plugins/espresso/.claude-plugin/plugin.json') as f:
              d = json.load(f)
          d.pop('skills', None)
          print(json.dumps(d, sort_keys=True))
          ")
          if [ "$ROOT" = "$NESTED" ]; then
            echo "plugin.json shared fields are in sync."
          else
            echo "FAIL: plugin.json copies have diverged." && exit 1
          fi

      - name: Verify banner.svg exists
        run: |
          test -f .github/banner.svg \
            && echo "banner.svg present." \
            || (echo "FAIL: .github/banner.svg missing — README img tag will 404." && exit 1)