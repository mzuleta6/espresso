<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" width="800" height="160">

  <!-- background + hairlines -->
  <rect width="800" height="160" fill="#FBF8F3"/>
  <rect x="0" y="0"   width="800" height="1" fill="#E5D8C4"/>
  <rect x="0" y="159" width="800" height="1" fill="#E5D8C4"/>

  <!-- coffee cup -->
  <g transform="translate(40, 44)">
    <path d="M 4 12 L 8 52 L 44 52 L 48 12 Z"
          fill="none" stroke="#BA7517" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 48 22 Q 64 22 64 32 Q 64 42 48 42"
          fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round"/>
    <path d="M 16 6 Q 20 0 16 -6"
          fill="none" stroke="#C4B09A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 26 8 Q 30 2 26 -4"
          fill="none" stroke="#C4B09A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 36 6 Q 40 0 36 -6"
          fill="none" stroke="#C4B09A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 0 56 Q 26 62 52 56"
          fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- wordmark — data voice: Courier New bold (matches artifact title) -->
  <text x="122" y="83"
        font-family="'Courier New', Courier, monospace"
        font-size="44" font-weight="700" letter-spacing="1"
        fill="#231A0C">espresso</text>

  <!-- subtitle — human voice: system-ui, sentence case -->
  <text x="124" y="108"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="400" letter-spacing="0.2"
        fill="#7A6A55">Claude without the noise.</text>

  <!-- vertical divider -->
  <rect x="530" y="36" width="0.75" height="88" fill="#E5D8C4"/>

  <!-- stat number — data voice: Courier New bold (matches artifact numbers) -->
  <text x="565" y="81"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700" letter-spacing="-1"
        fill="#BA7517">−66%</text>

  <!-- stat labels — human voice: system-ui, sentence case -->
  <text x="565" y="104"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="400" letter-spacing="0.1"
        fill="#9C8A6E">Average response</text>
  <text x="565" y="121"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="400" letter-spacing="0.1"
        fill="#9C8A6E">length reduction</text>

</svg>
